<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portilo — Madhu</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e63c2f;
      --text: #ffffff;
      --muted: #888888;
      --dim: #555555;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100%;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      background: rgba(17,17,17,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .nav-grid-icon {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .nav-grid-icon:hover { border-color: var(--muted); }
    .nav-grid-icon svg { opacity: 0.7; }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-cv {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 22px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-cv:hover { background: var(--surface); border-color: var(--muted); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding-top: 80px;
      position: relative;
      overflow: hidden;
    }

    /* Grid lines background */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }

    /* LEFT COLUMN */
    .hero-left {
      padding: 80px 60px 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      z-index: 2;
      border-right: 1px solid var(--border);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
      margin-bottom: 30px;
      animation: fadeUp 0.6s ease both;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .hero-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 12vw, 9rem);
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
      animation: fadeUp 0.7s 0.1s ease both;
    }

    .hero-title-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 10px;
      animation: fadeUp 0.7s 0.2s ease both;
    }
    .title-line {
      width: 40px; height: 1px;
      background: var(--muted);
    }
    .hero-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    .hero-bottom {
      margin-top: auto;
    }

    .quote-icon {
      font-size: 2.5rem;
      color: var(--dim);
      line-height: 1;
      margin-bottom: 16px;
      font-family: Georgia, serif;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .hero-bio {
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      max-width: 340px;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    /* RIGHT COLUMN */
    .hero-right {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: flex-end;
      overflow: hidden;
    }

    .hero-photo {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 480px;
      object-fit: cover;
      display: block;
      filter: grayscale(15%);
      animation: photoReveal 1s 0.3s ease both;
    }

    @keyframes photoReveal {
      from { opacity: 0; transform: translateX(-50%) translateY(30px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Placeholder silhouette if no image */
    .photo-placeholder {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      max-width: 480px;
      height: 80%;
      background: linear-gradient(to top, #1a1a1a, transparent);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 40px;
    }
    .photo-placeholder svg {
      width: 180px;
      opacity: 0.15;
    }

    /* Social sidebar */
    .social-sidebar {
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 0;
      z-index: 10;
    }
    .social-btn {
      width: 44px; height: 44px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      color: var(--muted);
    }
    .social-btn:hover { background: var(--surface); color: var(--text); }
    .social-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Rate box */
    .rate-box {
      position: absolute;
      bottom: 60px;
      right: 60px;
      text-align: right;
      z-index: 10;
      animation: fadeUp 0.7s 0.6s ease both;
    }
    .rate-amount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      line-height: 1;
      color: var(--text);
    }
    .rate-amount sup { font-size: 1.6rem; vertical-align: top; margin-top: 10px; display: inline-block; }
    .rate-amount sub { font-size: 1.8rem; }
    .rate-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* Hire button */
    .hire-btn {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 18px 60px;
      background: var(--text);
      color: var(--bg);
      border: none;
      cursor: pointer;
      border-radius: 40px 40px 0 0;
      transition: background 0.2s, transform 0.2s;
      animation: fadeUp 0.7s 0.7s ease both;
    }
    .hire-btn:hover {
      background: #e8e8e8;
      transform: translateX(-50%) translateY(-4px);
    }

    /* Bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
      z-index: 200;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero {
        grid-template-columns: 1fr;
      }
      .hero-left {
        padding: 60px 30px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      .hero-right {
        min-height: 60vh;
      }
      nav { padding: 18px 24px; }
      .social-sidebar { display: none; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="logo">Portilo<span>.</span></div>

    <div class="nav-grid-icon">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="5" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="10" y="1" width="5" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="1" y="10" width="5" height="5" rx="1" fill="white" opacity="0.7"/>
        <rect x="10" y="10" width="5" height="5" rx="1" fill="white" opacity="0.7"/>
      </svg>
    </div>

    <div class="nav-right">
      <button class="btn-cv">Download CV</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <!-- LEFT -->
    <div class="hero-left">
      <div>
        <div class="status-badge">
          <span class="status-dot"></span>
          Available for work
        </div>
        <h1 class="hero-name">MADHU</h1>
        <div class="hero-title-row">
          <div class="title-line"></div>
          <span class="hero-title">Sr. Product Designer</span>
        </div>
      </div>

      <div class="hero-bottom">
        <div class="quote-icon">"</div>
        <p class="hero-bio">
          Madhu Mia — Product Designer, I'm specializes in website design,
          prototyping, wire-framing, and design systems, turning complex ideas
          into clean, functional interfaces design.
        </p>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="hero-right">

      <!-- Photo placeholder (replace src with real photo) -->
      <div class="photo-placeholder">
        <svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg" fill="white">
          <ellipse cx="100" cy="80" rx="55" ry="65"/>
          <path d="M10 300 Q10 180 100 165 Q190 180 190 300Z"/>
        </svg>
      </div>
      <!-- To use a real photo, replace the placeholder above with:
      <img class="hero-photo" src="your-photo.jpg" alt="Madhu Mia" />
      -->

      <!-- Social -->
      <div class="social-sidebar">
        <a href="#" class="social-btn" aria-label="Instagram">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
        </a>
        <a href="#" class="social-btn" aria-label="X / Twitter">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </a>
        <a href="#" class="social-btn" aria-label="YouTube">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
        </a>
      </div>

      <!-- Rate -->
      <div class="rate-box">
        <div class="rate-amount"><sup>$</sup>70<sub>.00</sub></div>
        <div class="rate-label">Hourly Rate</div>
      </div>

      <!-- Hire CTA -->
      <button class="hire-btn">Hire Me</button>
    </div>
  </section>

  <!-- Bottom accent bar -->
  <div class="bottom-bar"></div>

  <script>
    // Smooth scroll & subtle parallax on mouse move
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 12;
      const y = (e.clientY / window.innerHeight - 0.5) * 12;
      const photo = document.querySelector('.photo-placeholder, .hero-photo');
      if (photo) photo.style.transform = `translateX(calc(-50% + ${x * 0.4}px)) translateY(${y * 0.4}px)`;
    });

    // CV button
    document.querySelector('.btn-cv').addEventListener('click', () => {
      alert('CV download would trigger here.');
    });

    // Hire button
    document.querySelector('.hire-btn').addEventListener('click', () => {
      alert('Contact form would open here.');
    });
  </script>
</body>
</html>
